syntax = "proto3";

package auth;

option go_package = "supply-chain-aggregator/services/auth-service/internal/delivery/grpc/pb;authpb";

service AuthService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool is_valid = 1;
  string user_id = 2;
  string role = 3;
}
